<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>2026 Masters Player List</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <link href="style.css" rel="stylesheet">
  <style>
    body { font: 14px sans-serif; margin: 20px; }
    .cut { color: #999; text-decoration: line-through; }
    .badge-live { font-size: 12px; vertical-align: middle; }
  </style>
</head>
<body>
  <h2>2026 Masters Tournament — Player List</h2>
  <p><a href="index.html">&larr; Back to Pool</a></p>
  <div id="lastUpdated" class="text-muted" style="font-size:12px; margin:5px 0;"></div>
  <div id="error"></div>
  <table class="table table-striped table-bordered table-sm" id="playerTable">
    <thead class="thead-dark">
      <tr>
        <th>Pos</th>
        <th>Player</th>
        <th>Country</th>
        <th>Score</th>
        <th>Strokes</th>
        <th>Status</th>
        <th>Purse</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    var POLL_INTERVAL = 180000;
    var lastUpdated = null;
    var pollTimer = null;
    var cachedPurseData = null;

    function isLiveData(data) {
        return data && data.results && data.results.leaderboard
            && data.results.tournament
            && data.results.tournament.start_date
            && data.results.tournament.start_date.substring(0, 4) === "2026";
    }

    // Initial load
    Promise.all([
        d3.json("scores.json"),
        d3.csv("purse.csv")
    ]).then(function(results) {
        var data = results[0];
        cachedPurseData = results[1];
        if (isLiveData(data)) {
            renderLive(data, cachedPurseData);
        } else {
            return loadField();
        }
    }).catch(function() {
        return loadField();
    });

    function loadField() {
        return d3.json("field2026.json").then(function(data) {
            if (!data || !data.players || data.players.length === 0) {
                throw new Error("field2026.json is empty or missing players array");
            }
            renderField(data);
        }).catch(function(error) {
            document.getElementById("error").innerHTML =
                '<div class="alert alert-danger"><strong>Error:</strong> ' + error.message + '</div>';
            throw error;
        });
    }

    function renderField(data) {
        document.querySelector("h2").textContent = data.tournament + " — Invited Field";
        document.querySelector("p").insertAdjacentHTML("beforeend",
            ' &middot; ' + data.players.length + ' players'
            + ' &middot; <span class="badge badge-secondary">Pre-tournament</span>'
            + ' <small class="text-muted">(' + data.source + ')</small>');

        var players = data.players.slice().sort(function(a, b) {
            return a.last_name.localeCompare(b.last_name);
        });

        var tbody = d3.select("#playerTable tbody");
        d3.selectAll("#playerTable thead th").each(function(d, i) {
            if (i >= 3) d3.select(this).style("display", "none");
        });

        var rows = tbody.selectAll("tr")
            .data(players)
            .enter()
            .append("tr");

        rows.append("td").text(function(d, i) { return i + 1; });
        rows.append("td").text(function(d) { return d.first_name + " " + d.last_name; });
        rows.append("td").text(function(d) { return d.country; });
        rows.append("td").style("display", "none");
        rows.append("td").style("display", "none");
        rows.append("td").style("display", "none");
    }

    function calcPayouts(purseData, players) {
        var active = players
            .filter(function(p) { return p.status === "active" && p.position > 0; })
            .slice()
            .sort(function(a, b) { return a.position - b.position; });

        var payouts = {};
        var i = 0;
        while (i < active.length) {
            var score = active[i].total_to_par;
            var j = i;
            while (j < active.length && active[j].total_to_par === score) { j++; }
            var count = j - i;
            var shared = 0;
            for (var k = 0; k < count; k++) {
                var slot = active[i + k].position;
                if (slot <= 50) {
                    shared += parseInt(purseData[slot - 1].amount, 10);
                }
            }
            var each = shared / count;
            for (var k = 0; k < count; k++) {
                payouts[active[i + k].position] = each;
            }
            i = j;
        }
        return payouts;
    }

    function formatPurse(amount) {
        if (!amount) return "—";
        return "$" + Math.round(amount).toLocaleString();
    }

    function renderLive(data, purseData) {
        // Clear previous rows
        d3.select("#playerTable tbody").selectAll("tr").remove();
        // Ensure score columns visible
        d3.selectAll("#playerTable thead th").each(function(d, i) {
            d3.select(this).style("display", null);
        });

        var tournament = data.results.tournament;
        document.querySelector("h2").textContent =
            tournament.name + " " + tournament.start_date.substring(0, 4) + " — Leaderboard";

        var players = data.results.leaderboard.slice().sort(function(a, b) {
            if (a.status === "cut" && b.status !== "cut") return 1;
            if (a.status !== "cut" && b.status === "cut") return -1;
            return a.position - b.position;
        });

        var payouts = purseData ? calcPayouts(purseData, players) : {};

        var tbody = d3.select("#playerTable tbody");
        var rows = tbody.selectAll("tr")
            .data(players)
            .enter()
            .append("tr")
            .attr("class", function(d) { return d.status === "cut" ? "cut" : ""; });

        rows.append("td").text(function(d) { return d.status === "cut" ? "CUT" : d.position; });
        rows.append("td").text(function(d) { return d.first_name + " " + d.last_name; });
        rows.append("td").text(function(d) { return d.country; });
        rows.append("td").text(function(d) {
            if (d.status === "cut") return "--";
            var par = d.total_to_par;
            if (par === 0) return "E";
            return par > 0 ? "+" + par : String(par);
        });
        rows.append("td").text(function(d) { return d.strokes || "--"; });
        rows.append("td").text(function(d) { return d.status; });
        rows.append("td").text(function(d) {
            if (d.status === "cut") return "—";
            return formatPurse(payouts[d.position]);
        });

        // Update status
        lastUpdated = tournament.live_details ? tournament.live_details.updated : null;
        var isCompleted = tournament.live_details && tournament.live_details.status === "completed";

        var el = document.getElementById("lastUpdated");
        if (isCompleted) {
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
            el.innerHTML = "Tournament Complete — Final Results &middot; " + players.length + " players";
        } else {
            var date = lastUpdated ? new Date(lastUpdated) : null;
            var timeStr = date ? date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) : "";
            el.innerHTML = '<span class="live-dot"></span>Live &middot; ' + players.length + ' players' +
                (timeStr ? ' &middot; Updated: ' + timeStr : '') +
                ' (auto-refreshing every ' + Math.round(POLL_INTERVAL / 60000) + ' min)';

            if (!pollTimer) {
                pollTimer = setInterval(function() {
                    d3.json("scores.json?_t=" + Date.now()).then(function(newData) {
                        if (!isLiveData(newData)) return;
                        var newTimestamp = newData.results.tournament.live_details
                            ? newData.results.tournament.live_details.updated : null;
                        if (newTimestamp && newTimestamp === lastUpdated) return;
                        renderLive(newData, cachedPurseData);
                    }).catch(function() {});
                }, POLL_INTERVAL);
            }
        }
    }
  </script>
</body>
</html>

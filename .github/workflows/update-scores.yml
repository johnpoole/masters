name: Refresh Masters Scores

on:
  schedule:
    # Every 5 minutes, 12:00–23:00 UTC (8am–7pm EDT), Thu–Sun
    # Masters 2026: April 10–13 (Thu–Sun)
    - cron: '*/5 12-23 * * 4-7'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch scores from masters.com
        run: |
          curl -sf --retry 3 -o scores_new.json \
            "https://www.masters.com/en_US/scores/feeds/2026/scores.json"

      - name: Validate leaderboard and check for changes
        id: check
        run: |
          count=$(python3 -c "
          import json
          d = json.load(open('scores_new.json'))
          lb = d.get('results', {}).get('leaderboard')
          print(len(lb) if lb else 0)
          ")
          if [ "$count" -eq 0 ]; then
            echo "Feed missing results.leaderboard — tournament not live yet, skipping commit"
            echo "commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$count players on leaderboard"
          if diff -q scores.json scores_new.json > /dev/null 2>&1; then
            echo "No score changes"
            echo "commit=false" >> "$GITHUB_OUTPUT"
          else
            echo "Scores changed"
            echo "commit=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated scores
        if: steps.check.outputs.commit == 'true'
        run: |
          mv scores_new.json scores.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          git commit -m "refresh scores — $(date -u +%Y-%m-%dT%H:%M)Z"
          git push

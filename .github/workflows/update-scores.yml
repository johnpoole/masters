name: Update Scores

on:
  # schedule disabled — local Windows task handles updates
  # schedule:
  #   - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check tournament dates
        if: github.event_name == 'schedule'
        run: |
          DAY=$(date -u +%m-%d)
          if [[ "$DAY" < "04-09" || "$DAY" > "04-12" ]]; then
            echo "Outside tournament dates (Apr 9-12), skipping"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Fetch ESPN scores
        run: |
          ESPN_DATE=$(curl -sf -D - -o espn-raw.json \
            "https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard/401811941" \
            | grep -i '^date:' | sed 's/^[Dd]ate: *//' | tr -d '\r')
          echo "ESPN_DATE=$ESPN_DATE" >> "$GITHUB_ENV"

      - name: Transform to scores.json
        run: node transform-espn.js espn-raw.json "$ESPN_DATE" > scores.json

      - name: Commit if changed
        run: |
          git diff --quiet scores.json && echo "No score changes" && exit 0
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add scores.json
          git commit -m "refresh scores — $(date -u +%Y-%m-%dT%H:%M)"
          git push
